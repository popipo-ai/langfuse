<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chat Preview</title>
<!-- langfuse-chat-preview pir-bff-v1: self-hosted only; no external scripts/fonts. -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#111113;--surface:#18181b;--surface2:#202024;--border:#2f2f36;--border2:#44444c;--text:#e4e4e7;--muted:#8b8b95;--accent:#60a5fa;--user:#2563eb;--ok:#34d399;--err:#ef4444;--warn:#f59e0b;--r:12px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased}
button,input{font:inherit}
.app{display:flex;flex-direction:column;height:100%;max-width:920px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.header h1{font-size:15px;font-weight:650}
.meta{margin-top:2px;color:var(--muted);font-size:12px}
.actions{display:flex;align-items:center;gap:8px}
.link-btn{border:0;background:transparent;color:var(--accent);font-size:13px;font-weight:550;cursor:pointer}
.link-btn[disabled]{cursor:not-allowed;opacity:.45}
.link-btn:hover:not([disabled]){text-decoration:underline}
.chat{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:18px;scrollbar-width:thin;scrollbar-color:#313138 transparent}
.chat::-webkit-scrollbar{width:6px}.chat::-webkit-scrollbar-thumb{background:#313138;border-radius:3px}
.center{display:flex;height:100%;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--muted);text-align:center;padding:24px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:999px;animation:spin .8s linear infinite}
.sm-spinner{width:16px;height:16px;border-width:1.5px}
@keyframes spin{to{transform:rotate(360deg)}}
.auth-box{width:min(420px,90vw);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;text-align:left}
.auth-box h2{font-size:16px;font-weight:650;margin-bottom:6px}
.auth-box p{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:16px}
.auth-box label{display:block;font-size:12px;font-weight:550;color:var(--muted);margin:12px 0 5px}
.auth-box input{width:100%;padding:9px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);outline:none}
.auth-box input:focus{border-color:var(--accent)}
.auth-btn{width:100%;margin-top:16px;padding:9px 10px;border:0;border-radius:6px;background:var(--accent);color:white;font-weight:600;cursor:pointer}
.auth-err{margin-top:10px;color:var(--err);font-size:12px;line-height:1.4}
.divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:11px;padding:4px 0}
.divider::before,.divider::after{content:"";height:1px;flex:1;background:var(--border)}
.turn{display:flex;flex-direction:column;gap:6px}
.role-label{padding:0 4px;color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase}
.role-right{text-align:right}
.timestamp{padding:0 4px;color:var(--muted);font-size:11px}
.ts-right{text-align:right}
.bubble{max-width:78%;padding:12px 16px;border-radius:var(--r);font-size:14px;line-height:1.65;word-break:break-word;white-space:pre-wrap}
.bubble-user{align-self:flex-end;background:var(--user);color:#fff;border-bottom-right-radius:4px}
.bubble-asst{align-self:flex-start;background:var(--surface);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px;white-space:normal}
.md p{margin:0 0 8px}.md p:last-child{margin-bottom:0}
.md code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;color:#f472b6;font-family:"SF Mono",Monaco,Consolas,monospace;font-size:12px}
.md pre{margin:8px 0;padding:10px 12px;background:rgba(0,0,0,.35);border-radius:8px;overflow-x:auto}
.md pre code{display:block;background:transparent;padding:0;color:#c4c4cc;white-space:pre}
.md ul,.md ol{margin:6px 0;padding-left:20px}.md li{margin:2px 0}
.md h1,.md h2,.md h3{margin:10px 0 6px;color:#fafafa;font-weight:650}.md h1{font-size:18px}.md h2{font-size:16px}.md h3{font-size:14px}
.md blockquote{margin:8px 0;padding-left:12px;border-left:3px solid var(--accent);color:var(--muted)}
.md table{width:100%;border-collapse:collapse;margin:8px 0}.md th,.md td{border:1px solid var(--border2);padding:6px 10px;text-align:left;font-size:13px}.md th{background:rgba(255,255,255,.05)}
.md a{color:var(--accent);text-decoration:none}.md a:hover{text-decoration:underline}.md img{max-width:100%;border-radius:6px}
.card{align-self:flex-start;max-width:82%;background:#09090b;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;margin:2px 0}
.tool-ok{border-left:3px solid var(--ok)}.tool-fail{border-left:3px solid var(--err)}.event-card{border-left:3px solid var(--warn);color:#d4d4d8}
.card-head{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.card-icon{font-size:14px}.tool-ok .card-icon{color:var(--ok)}.tool-fail .card-icon{color:var(--err)}.event-card .card-icon{color:var(--warn)}
.card-name{font-weight:650;color:var(--text)}.card-meta{margin-left:auto;color:var(--muted);font-size:11px}
.toggle{display:flex;align-items:center;gap:4px;margin-top:7px;background:transparent;border:0;color:var(--muted);font-size:12px;font-weight:550;cursor:pointer}
.toggle:hover{color:var(--text)}
.pre{margin-top:5px;max-height:300px;overflow:auto;background:rgba(0,0,0,.35);border-radius:6px;padding:8px 10px;color:#b8b8c2;font-size:12px;line-height:1.5;white-space:pre-wrap;word-break:break-word;font-family:"SF Mono",Monaco,Consolas,monospace}
.loading-trace{display:flex;align-items:center;gap:8px;padding:12px 0;color:var(--muted);font-size:13px}
@media(max-width:640px){.header{padding:14px 16px}.chat{padding:18px 14px}.bubble,.card{max-width:92%}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
(function(){
"use strict";

var params=new URLSearchParams(location.search);
var SESSION_ID=params.get("sessionId");
var PROJECT_ID=params.get("projectId");
var API_BASE=(params.get("apiBase")||"").replace(/\/+$/,"");
var API_KEY_STORAGE="lf-chat-preview-keys-"+(PROJECT_ID||"unknown");
var app=document.getElementById("app");
var collectedTraces=[];
var sessionData=null;

function esc(value){
  if(value==null)return "";
  return String(value).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function parseIfString(value){
  if(typeof value!=="string")return value;
  var text=value.trim();
  if(!text)return value;
  if((text[0]!=="{"&&text[0]!=="[")&&text[0]!=='"')return value;
  try{return JSON.parse(text)}catch(_e){return value}
}
function asObject(value){
  value=parseIfString(value);
  return value&&typeof value==="object"&&!Array.isArray(value)?value:null;
}
function asArray(value){
  value=parseIfString(value);
  return Array.isArray(value)?value:null;
}
function nonEmptyString(value){
  if(typeof value!=="string")return "";
  var trimmed=value.trim();
  return trimmed?value:"";
}
function stringifyValue(value){
  if(value==null)return "";
  if(typeof value==="string")return value;
  try{return JSON.stringify(value,null,2)}catch(_e){return String(value)}
}
function pickFirst(){
  for(var i=0;i<arguments.length;i++){
    var value=arguments[i];
    if(value!==undefined&&value!==null&&value!=="")return value;
  }
  return "";
}
function loadKeys(){try{return JSON.parse(localStorage.getItem(API_KEY_STORAGE))||null}catch(_e){return null}}
function saveKeys(pk,sk){localStorage.setItem(API_KEY_STORAGE,JSON.stringify({pk:pk,sk:sk}))}
function clearKeys(){localStorage.removeItem(API_KEY_STORAGE)}
function makeAuth(pk,sk){return "Basic "+btoa(pk+":"+sk)}

function apiFetch(path,auth){
  return fetch(API_BASE+path,{headers:{Authorization:auth}}).then(function(response){
    if(response.status===401||response.status===403){
      clearKeys();
      throw new Error("auth");
    }
    if(response.status===404){
      clearKeys();
      throw new Error("not_found");
    }
    if(!response.ok){
      throw new Error("HTTP "+response.status);
    }
    return response.json();
  });
}

function renderInline(text){
  text=esc(text);
  text=text.replace(/`([^`]+)`/g,"<code>$1</code>");
  text=text.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  text=text.replace(/__([^_]+)__/g,"<strong>$1</strong>");
  text=text.replace(/\*([^*]+)\*/g,"<em>$1</em>");
  text=text.replace(/_([^_]+)_/g,"<em>$1</em>");
  text=text.replace(/~~([^~]+)~~/g,"<del>$1</del>");
  text=text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2">');
  text=text.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  return text;
}

function renderMarkdown(text){
  text=String(text||"");
  var lines=text.split("\n");
  var html="";
  var i=0;
  while(i<lines.length){
    var line=lines[i];
    if(/^```/.test(line)){
      var code=[];
      i++;
      while(i<lines.length&&!/^```\s*$/.test(lines[i])){code.push(lines[i]);i++}
      if(i<lines.length)i++;
      html+="<pre><code>"+esc(code.join("\n"))+"</code></pre>";
      continue;
    }
    if(!line.trim()){i++;continue}
    var heading=line.match(/^(#{1,3})\s+(.*)/);
    if(heading){
      html+="<h"+heading[1].length+">"+renderInline(heading[2])+"</h"+heading[1].length+">";
      i++;
      continue;
    }
    if(/^[-*_]{3,}\s*$/.test(line)){html+="<hr>";i++;continue}
    if(/^\|/.test(line)&&i+1<lines.length&&/^[\s|:-]+$/.test(lines[i+1])){
      var headers=line.split("|").filter(function(c){return c.trim()!==""});
      html+="<table><thead><tr>"+headers.map(function(c){return "<th>"+renderInline(c.trim())+"</th>"}).join("")+"</tr></thead><tbody>";
      i+=2;
      while(i<lines.length&&/^\|/.test(lines[i])){
        var cols=lines[i].split("|").filter(function(c){return c.trim()!==""});
        html+="<tr>"+cols.map(function(c){return "<td>"+renderInline(c.trim())+"</td>"}).join("")+"</tr>";
        i++;
      }
      html+="</tbody></table>";
      continue;
    }
    if(/^[-*]\s+/.test(line)){
      html+="<ul>";
      while(i<lines.length&&/^[-*]\s+/.test(lines[i])){html+="<li>"+renderInline(lines[i].replace(/^[-*]\s+/,""))+"</li>";i++}
      html+="</ul>";
      continue;
    }
    if(/^\d+\.\s+/.test(line)){
      html+="<ol>";
      while(i<lines.length&&/^\d+\.\s+/.test(lines[i])){html+="<li>"+renderInline(lines[i].replace(/^\d+\.\s+/,""))+"</li>";i++}
      html+="</ol>";
      continue;
    }
    if(/^>\s?/.test(line)){
      var block=[];
      while(i<lines.length&&/^>\s?/.test(lines[i])){block.push(lines[i].replace(/^>\s?/,""));i++}
      html+="<blockquote>"+renderInline(block.join("\n")).replace(/\n/g,"<br>")+"</blockquote>";
      continue;
    }
    var paragraph=[];
    while(i<lines.length&&lines[i].trim()&&!/^```/.test(lines[i])&&!/^#{1,3}\s+/.test(lines[i])&&!/^[-*_]{3,}\s*$/.test(lines[i])&&!/^\|/.test(lines[i])&&!/^[-*]\s+/.test(lines[i])&&!/^\d+\.\s+/.test(lines[i])&&!/^>\s?/.test(lines[i])){
      paragraph.push(lines[i]);
      i++;
    }
    if(paragraph.length)html+="<p>"+renderInline(paragraph.join("\n")).replace(/\n/g,"<br>")+"</p>";
  }
  return '<div class="md">'+html+"</div>";
}

function extractUserInput(input){
  input=parseIfString(input);
  if(input==null)return "";
  if(typeof input==="string")return input;
  if(Array.isArray(input)){
    var messages=input.filter(function(item){return item&&typeof item==="object"&&(item.role==="user"||item.role==="assistant")});
    var lastUser=messages.filter(function(item){return item.role==="user"}).pop();
    if(lastUser)return stringifyValue(lastUser.content);
    var last=messages.pop();
    return last?stringifyValue(last.content):input.map(extractUserInput).filter(Boolean).join("\n");
  }
  if(typeof input==="object"){
    if(input.messages!=null)return extractUserInput(input.messages);
    return stringifyValue(pickFirst(input.message,input.content,input.text,input.prompt,input.query,input.input));
  }
  return String(input);
}

function isPreviewEvent(value){
  return value&&typeof value==="object"&&(
    value.type==="content"||
    value.type==="tool_call"||
    value.type==="user_input_requested"||
    value.type==="user_input_resolved"
  );
}

function extractEvents(output){
  output=parseIfString(output);
  if(!output)return null;
  if(Array.isArray(output))return output.some(isPreviewEvent)?output:null;
  if(typeof output==="object"&&Array.isArray(output.events))return output.events;
  return null;
}

function extractAssistantFallback(output){
  output=parseIfString(output);
  if(output==null)return "";
  if(typeof output==="string")return output;
  if(Array.isArray(output)){
    var assistant=output.filter(function(item){return item&&typeof item==="object"&&item.role==="assistant"}).pop();
    return assistant?stringifyValue(assistant.content):"";
  }
  if(typeof output==="object"){
    if(Array.isArray(output.events))return "";
    return stringifyValue(pickFirst(output.content,output.text,output.message,output.answer,output.completion,output.output));
  }
  return String(output);
}

function isPirBffTrace(trace){
  var metadata=asObject(trace&&trace.metadata)||{};
  return metadata.source==="bff_raw_pir_stream"||trace.name==="pir.agent.turn";
}

function isRenderableTrace(trace){
  if(!trace)return false;
  if(isPirBffTrace(trace))return true;
  return !!(extractUserInput(trace.input)||extractEvents(trace.output)||extractAssistantFallback(trace.output));
}

function extractToolArgs(evt){
  if(evt.tool_args!=null)return evt.tool_args;
  if(evt.arguments!=null)return evt.arguments;
  if(evt.args!=null)return evt.args;
  if(evt.params!=null)return evt.params;
  if(evt.input!=null)return evt.input;
  if(evt.function&&evt.function.arguments!=null)return evt.function.arguments;
  return null;
}

function renderToolCard(evt){
  var fail=evt.success===false||!!evt.error;
  var cls="card "+(fail?"tool-fail":"tool-ok");
  var elapsed=evt.elapsed_ms!=null?" · "+evt.elapsed_ms+"ms":"";
  var toolArgs=extractToolArgs(evt);
  var html='<div class="'+cls+'"><div class="card-head">';
  html+='<span class="card-icon">'+(fail?"✕":"⚡")+'</span>';
  html+='<span class="card-name">'+esc(evt.tool_name||evt.name||"unknown")+'</span>';
  html+='<span class="card-meta">'+(fail?"failed":"ok")+elapsed+"</span></div>";
  if(toolArgs!=null)html+='<details><summary class="toggle">Arguments</summary><pre class="pre">'+esc(stringifyValue(toolArgs))+"</pre></details>";
  if(evt.result!=null)html+='<details><summary class="toggle">Result</summary><pre class="pre">'+esc(stringifyValue(evt.result))+"</pre></details>";
  if(evt.error)html+='<details open><summary class="toggle">Error</summary><pre class="pre">'+esc(stringifyValue(evt.error))+"</pre></details>";
  html+="</div>";
  return html;
}

function renderUserInputEvent(evt){
  var title=evt.type==="user_input_resolved"?"User input resolved":"User input requested";
  var html='<div class="card event-card"><div class="card-head">';
  html+='<span class="card-icon">?</span><span class="card-name">'+esc(title)+'</span>';
  html+='<span class="card-meta">'+esc(evt.status||evt.user_input_status||"")+"</span></div>";
  if(evt.questions!=null)html+='<details><summary class="toggle">Questions</summary><pre class="pre">'+esc(stringifyValue(evt.questions))+"</pre></details>";
  if(evt.answers!=null)html+='<details><summary class="toggle">Answers</summary><pre class="pre">'+esc(stringifyValue(evt.answers))+"</pre></details>";
  html+="</div>";
  return html;
}

function renderTrace(trace,lastDateRef){
  var ts=new Date(trace.timestamp);
  var dateStr=isNaN(ts.getTime())?"":ts.toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric"});
  var timeStr=isNaN(ts.getTime())?"":ts.toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  var html="";
  if(dateStr&&dateStr!==lastDateRef.value){
    lastDateRef.value=dateStr;
    html+='<div class="divider">'+esc(dateStr)+"</div>";
  }
  var input=extractUserInput(trace.input);
  if(input){
    html+='<div class="turn"><div class="role-label role-right">User</div>';
    html+='<div class="bubble bubble-user">'+esc(input)+"</div>";
    html+='<div class="timestamp ts-right">'+esc(timeStr)+"</div></div>";
  }
  var events=extractEvents(trace.output);
  var fallback=!events?extractAssistantFallback(trace.output):"";
  if(events&&events.length){
    html+='<div class="turn"><div class="role-label">Assistant</div>';
    events.forEach(function(evt){
      if(!evt||typeof evt!=="object")return;
      if(evt.type==="content"&&nonEmptyString(evt.content)){
        html+='<div class="bubble bubble-asst">'+renderMarkdown(evt.content)+"</div>";
      }else if(evt.type==="tool_call"){
        html+=renderToolCard(evt);
      }else if(evt.type==="user_input_requested"||evt.type==="user_input_resolved"){
        html+=renderUserInputEvent(evt);
      }
    });
    var outputObj=asObject(trace.output);
    if(outputObj&&(outputObj.status||outputObj.error)){
      html+='<div class="timestamp">'+esc([outputObj.status,outputObj.error].filter(Boolean).join(" · "))+"</div>";
    }else{
      html+='<div class="timestamp">'+esc(timeStr)+"</div>";
    }
    html+="</div>";
  }else if(fallback){
    html+='<div class="turn"><div class="role-label">Assistant</div>';
    html+='<div class="bubble bubble-asst">'+renderMarkdown(fallback)+"</div>";
    html+='<div class="timestamp">'+esc(timeStr)+"</div></div>";
  }
  return html;
}

function showAuth(message){
  app.innerHTML='<div class="center"><div class="auth-box">'
    +'<h2>API Key Required</h2>'
    +'<p>Enter this Langfuse project API key to view the session through the public API.</p>'
    +'<label>Public Key</label><input id="auth-pk" autocomplete="off" placeholder="pk-lf-...">'
    +'<label>Secret Key</label><input id="auth-sk" type="password" autocomplete="off" placeholder="sk-lf-...">'
    +'<button class="auth-btn" id="auth-go">Connect</button>'
    +(message?'<div class="auth-err">'+esc(message)+"</div>":"")
    +"</div></div>";
  document.getElementById("auth-go").onclick=function(){
    var pk=document.getElementById("auth-pk").value.trim();
    var sk=document.getElementById("auth-sk").value.trim();
    if(!pk||!sk){showAuth("Please fill in both keys.");return}
    var auth=makeAuth(pk,sk);
    saveKeys(pk,sk);
    startApp(auth);
  };
}

function sessionTraceRangeQuery(session){
  var parts=[];
  var createdAt=session&&session.createdAt?new Date(session.createdAt):null;
  if(createdAt&&!isNaN(createdAt.getTime())){
    var from=new Date(createdAt.getTime()-24*60*60*1000);
    parts.push("fromTimestamp="+encodeURIComponent(from.toISOString()));
  }else{
    var defaultFrom=new Date(Date.now()-30*24*60*60*1000);
    parts.push("fromTimestamp="+encodeURIComponent(defaultFrom.toISOString()));
  }
  parts.push("toTimestamp="+encodeURIComponent(new Date().toISOString()));
  return parts.join("&");
}

function fetchAllTraceRefs(auth,session){
  var all=[];
  var limit=100;
  var range=sessionTraceRangeQuery(session);
  function fetchPage(page){
    var url="/api/public/traces?sessionId="+encodeURIComponent(SESSION_ID)+"&limit="+limit+"&page="+page+"&fields=core,io&orderBy=timestamp.asc&"+range;
    return apiFetch(url,auth).then(function(body){
      if(!body||!Array.isArray(body.data))return all;
      all=all.concat(body.data);
      var totalPages=body.meta&&body.meta.totalPages?body.meta.totalPages:1;
      if(page<totalPages)return fetchPage(page+1);
      return all;
    });
  }
  return fetchPage(1);
}

function fetchTraceDetail(auth,traceId){
  return apiFetch("/api/public/traces/"+encodeURIComponent(traceId)+"?fields=core,io,observations,metrics",auth);
}

function mergeTraceDetail(ref,detail){
  if(!detail||!detail.id)return ref;
  var merged={};
  Object.keys(ref||{}).forEach(function(key){merged[key]=ref[key]});
  Object.keys(detail).forEach(function(key){merged[key]=detail[key]});
  if((merged.input==null||merged.input==="")&&ref&&ref.input!=null)merged.input=ref.input;
  if((merged.output==null||merged.output==="")&&ref&&ref.output!=null)merged.output=ref.output;
  if((merged.metadata==null||Object.keys(asObject(merged.metadata)||{}).length===0)&&ref&&ref.metadata!=null)merged.metadata=ref.metadata;
  return merged;
}

window.downloadSessionJson=function(){
  if(!sessionData)return;
  var traces=collectedTraces.filter(Boolean).sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp)});
  var turns=traces.map(function(trace){
    var events=extractEvents(trace.output)||[];
    var toolCalls=[];
    var assistantParts=[];
    events.forEach(function(evt){
      if(evt&&evt.type==="tool_call"&&(evt.tool_name||evt.name))toolCalls.push(evt.tool_name||evt.name);
      if(evt&&evt.type==="content"&&evt.content)assistantParts.push(evt.content);
    });
    return {
      timestamp:trace.timestamp,
      trace_id:trace.id,
      user_id:trace.userId||"",
      user_message:extractUserInput(trace.input),
      assistant_response:assistantParts.join("\n")||extractAssistantFallback(trace.output),
      tool_calls:toolCalls,
      tool_count:toolCalls.length,
      status:asObject(trace.output)&&asObject(trace.output).status||"",
      metadata:trace.metadata||{}
    };
  });
  var blob=new Blob([JSON.stringify({session_id:SESSION_ID,project_id:PROJECT_ID,total_turns:turns.length,turns:turns},null,2)],{type:"application/json;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var link=document.createElement("a");
  link.href=url;
  link.download="session-"+SESSION_ID+".json";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
};

function startApp(auth){
  collectedTraces=[];
  sessionData={id:SESSION_ID,projectId:PROJECT_ID};
  app.innerHTML='<div class="center"><div class="spinner"></div><div>Loading session...</div></div>';
  fetchAllTraceRefs(auth,null)
    .then(function(refs){
      var seen={};
      var traceRefs=refs.filter(function(trace){
        if(!trace||!trace.id||seen[trace.id])return false;
        seen[trace.id]=true;
        return true;
      }).sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp)});
      var meta="Session: "+SESSION_ID.slice(0,12)+"... · "+traceRefs.length+" traces";
      app.innerHTML='<header class="header"><div><h1>Chat Preview</h1><div class="meta">'+esc(meta)+'</div></div>'
        +'<div class="actions"><button class="link-btn" id="download-btn" disabled onclick="downloadSessionJson()">Download JSON</button>'
        +'<button class="link-btn" onclick="window.close()">Close</button></div></header><div class="chat" id="chat"></div>';
      var chat=document.getElementById("chat");
      if(traceRefs.length===0){
        chat.innerHTML='<div class="center">No traces found for this session.</div>';
        return;
      }
      renderAll(traceRefs,chat);
    }).catch(function(error){
      if(error.message==="auth"){showAuth("Session expired. Please enter API keys again.");return}
      if(error.message==="not_found"){showAuth("Session not found. The key may belong to a different project.");return}
      app.innerHTML='<div class="center" style="color:var(--err)">Error: '+esc(error.message)+"</div>";
    });
}

function renderAll(details,chat){
  var traces=details.filter(isRenderableTrace).sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp)});
  var pirTraces=traces.filter(isPirBffTrace);
  var selected=pirTraces.length?pirTraces:traces;
  collectedTraces=selected;
  var lastDate={value:""};
  var html=selected.map(function(trace){return renderTrace(trace,lastDate)}).join("");
  chat.innerHTML=html||'<div class="center">No renderable input/output found for this session.</div>';
  var button=document.getElementById("download-btn");
  if(button)button.disabled=false;
  setTimeout(function(){chat.scrollTop=chat.scrollHeight},120);
}

if(!SESSION_ID||!PROJECT_ID){
  app.innerHTML='<div class="center">Missing sessionId or projectId in URL.</div>';
  return;
}
var saved=loadKeys();
if(saved&&saved.pk&&saved.sk)startApp(makeAuth(saved.pk,saved.sk));
else showAuth();
})();
</script>
