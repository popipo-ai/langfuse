name: Build & Push langfuse-web

on:
  push:
    branches: [feat/dark-mode-reskin]
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
  IMAGE_REPO: ${{ secrets.HARBOR_PROJECT }}/langfuse-web

jobs:
  build-and-push:
    # Harbor 仅内网可达时，改为公司 self-hosted runner，例如：
    # runs-on: [self-hosted, linux]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:custom
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
