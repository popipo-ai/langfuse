name: Build & Push langfuse-web

# 对齐 workspace（Loop 根仓库）Harbor 发布约定：
# - popipo-bff-ci.yml / pir-release.yml
# - deploy/popipo-bff/POPIPO_BFF_RELEASE_CI_PLAN.md
on:
  push:
    branches: [feat/dark-mode-reskin]
  workflow_dispatch:

concurrency:
  group: langfuse-web-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HARBOR_REGISTRY: cn-harbor.d5render.com:8443
  HARBOR_USERNAME: popipo
  HARBOR_IMAGE: cn-harbor.d5render.com:8443/popipo/langfuse-web
  DOCKER_BUILD_PROXY: http://proxy.d5next.com:7897
  DOCKER_BUILD_NO_PROXY: 127.0.0.1,localhost,.d5next.com,.d5render.com

jobs:
  docker-build:
    name: Docker build
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve CI image tag
        id: tag
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short HEAD)"
          final_tag="sha-${short_sha}"
          echo "final_tag=$final_tag" >> "$GITHUB_OUTPUT"
          echo "local_image=langfuse-web:${final_tag}" >> "$GITHUB_OUTPUT"
          echo "harbor_image=${HARBOR_IMAGE}:${final_tag}" >> "$GITHUB_OUTPUT"
          echo "latest_image=${HARBOR_IMAGE}:feat-dark-mode-reskin-latest" >> "$GITHUB_OUTPUT"

      - name: Build langfuse-web Docker image
        env:
          DOCKER_PLATFORM: linux/amd64
        run: |
          set -euo pipefail
          export HTTP_PROXY="$DOCKER_BUILD_PROXY"
          export HTTPS_PROXY="$DOCKER_BUILD_PROXY"
          export ALL_PROXY="$DOCKER_BUILD_PROXY"
          export NO_PROXY="$DOCKER_BUILD_NO_PROXY"
          export http_proxy="$DOCKER_BUILD_PROXY"
          export https_proxy="$DOCKER_BUILD_PROXY"
          export all_proxy="$DOCKER_BUILD_PROXY"
          export no_proxy="$DOCKER_BUILD_NO_PROXY"
          docker info >/dev/null
          docker build -f web/Dockerfile \
            --platform linux/amd64 \
            -t "${{ steps.tag.outputs.local_image }}" \
            .

      - name: Login Harbor
        env:
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "$HARBOR_PASSWORD" ]]; then
            echo "HARBOR_PASSWORD secret is required" >&2
            exit 1
          fi
          echo "$HARBOR_PASSWORD" | docker login "${{ env.HARBOR_REGISTRY }}" \
            --username "${{ env.HARBOR_USERNAME }}" \
            --password-stdin

      - name: Push image to Harbor
        run: |
          set -euo pipefail
          docker tag "${{ steps.tag.outputs.local_image }}" "${{ steps.tag.outputs.harbor_image }}"
          docker tag "${{ steps.tag.outputs.local_image }}" "${{ steps.tag.outputs.latest_image }}"
          docker push "${{ steps.tag.outputs.harbor_image }}"
          docker push "${{ steps.tag.outputs.latest_image }}"

      - name: CI summary
        if: always()
        run: |
          {
            echo "## Langfuse web CI (docker build)"
            echo ""
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Image tag:** \`${{ steps.tag.outputs.final_tag }}\`"
            echo "- **Harbor image:** \`${{ steps.tag.outputs.harbor_image }}\`"
            echo "- **Rolling tag:** \`${{ steps.tag.outputs.latest_image }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
